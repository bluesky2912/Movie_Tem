<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="reelBody" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#3a2712"/>
      <stop offset="100%" stop-color="#1B120A"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#080503"/>

  <!-- Outer reel ring -->
  <circle cx="32" cy="32" r="26" fill="url(#reelBody)" stroke="#C9962E" stroke-width="2.5"/>

  <!-- Sprocket holes around the reel -->
  <g fill="#080503" stroke="#C9962E" stroke-width="1.2">
    <circle cx="32" cy="12" r="4.2"/>
    <circle cx="49.6" cy="22" r="4.2"/>
    <circle cx="49.6" cy="42" r="4.2"/>
    <circle cx="32" cy="52" r="4.2"/>
    <circle cx="14.4" cy="42" r="4.2"/>
    <circle cx="14.4" cy="22" r="4.2"/>
  </g>

  <!-- Center hub -->
  <circle cx="32" cy="32" r="9" fill="#0d0905" stroke="#C9962E" stroke-width="2"/>
  <circle cx="32" cy="32" r="3" fill="#C9962E"/>
</svg>
